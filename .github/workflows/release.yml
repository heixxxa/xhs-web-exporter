name: Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: List dist files
        run: ls -la dist/

      - name: Check file size
        run: |
          if [ -f dist/xhs-web-exporter.user.js ]; then
            echo "File exists!"
            file dist/xhs-web-exporter.user.js
            wc -c dist/xhs-web-exporter.user.js
          else
            echo "File NOT found!"
            ls -la dist/
          fi

      - name: Generate changelog
        run: npm run changelog
        if: startsWith(github.ref, 'refs/tags/')
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.user.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
